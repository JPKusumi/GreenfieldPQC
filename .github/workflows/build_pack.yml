name: Build and Pack NuGet

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]  # Triggers on tags like v1.0.1, but publish is manual
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from the GitHub Actions UI

jobs:
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: windows-latest, arch: x64, rid: win-x64, libname: oqs.dll }
          - { os: windows-latest, arch: arm64, rid: win-arm64, libname: oqs.dll }  # Experimental: cross-compile for Windows ARM64
          - { os: ubuntu-22.04, arch: x64, rid: linux-x64, libname: liboqs.so }
          - { os: ubuntu-22.04, arch: arm64, rid: linux-arm64, libname: liboqs.so }  # Cross-compile for ARM on 22.04
          - { os: macos-latest, arch: x64, rid: osx-x64, libname: liboqs.dylib }
          - { os: macos-14, arch: arm64, rid: osx-arm64, libname: liboqs.dylib }  # Native ARM runner

    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup Visual Studio environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.config.arch == 'arm64' && 'amd64_arm64' || 'x64' }}

      - name: Clone liboqs
        run: git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git

      - name: Diagnostics (Windows ARM64)
        if: matrix.config.rid == 'win-arm64'
        shell: pwsh
        run: |
          Write-Host "=== CMake version ==="
          cmake --version
          Write-Host "=== Visual Studio installations ==="
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vsWhere) {
            & $vsWhere -latest -format json
          } else {
            Write-Host "vswhere.exe not found at expected path"
          }
          Write-Host "=== CL compiler location ==="
          where.exe cl 2>&1 || Write-Host "cl.exe not found in PATH"
          Write-Host "=== CL version ==="
          try { cl /? 2>&1 | Select-Object -First 3 } catch { Write-Host "cl.exe error: $_" }
          Write-Host "=== LINK location ==="
          where.exe link 2>&1 || Write-Host "link.exe not found in PATH"
          Write-Host "=== VCINSTALLDIR ==="
          Write-Host $env:VCINSTALLDIR
          Write-Host "=== VCToolsInstallDir ==="
          Write-Host $env:VCToolsInstallDir
          Write-Host "=== VS140COMNTOOLS / VS170COMNTOOLS ==="
          Write-Host "VS140COMNTOOLS: $env:VS140COMNTOOLS"
          Write-Host "VS170COMNTOOLS: $env:VS170COMNTOOLS"

      - name: Create toolchain file for Linux ARM64
        if: matrix.config.rid == 'linux-arm64'
        working-directory: liboqs
        run: |
          echo "set(CMAKE_SYSTEM_NAME Linux)" > toolchain-aarch64.cmake
          echo "set(CMAKE_SYSTEM_PROCESSOR aarch64)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)" >> toolchain-aarch64.cmake
          echo "set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)" >> toolchain-aarch64.cmake

      - name: Build liboqs (Windows)
        if: runner.os == 'Windows'
        working-directory: liboqs
        shell: pwsh
        run: |
          $cmakeArch = if ("${{ matrix.config.arch }}" -eq "arm64") { "ARM64" } else { "x64" }
          Write-Host "=== Building liboqs for Windows $cmakeArch ==="
          mkdir build
          cd build

          $extraFlags = ""
          if ("${{ matrix.config.arch }}" -eq "arm64") {
            Write-Host "=== win-arm64: adding __NO_AESNI__ define via CMAKE_*_FLAGS ==="
            $extraFlags = "-DCMAKE_C_FLAGS=`"/D__NO_AESNI__`" -DCMAKE_CXX_FLAGS=`"/D__NO_AESNI__`""
          }

          cmake .. -G "Visual Studio 17 2022" -A $cmakeArch -DBUILD_SHARED_LIBS=YES -DCMAKE_BUILD_TYPE=Release -DOQS_BUILD_ONLY_LIB=YES -DOQS_USE_OPENSSL=OFF -DOQS_MINIMAL_BUILD="KEM_ML_KEM_512;KEM_ML_KEM_768;KEM_ML_KEM_1024;SIG_ML_DSA_44;SIG_ML_DSA_65;SIG_ML_DSA_87" -DOQS_OPT_TARGET=generic -DOQS_USE_CPU_EXTENSIONS=OFF -DOQS_DIST_BUILD=ON -DOQS_USE_AES_INSTRUCTIONS=OFF $extraFlags

          Write-Host "=== CMakeCache (OQS/AES/ARCH) ==="
          Get-Content .\CMakeCache.txt | Select-String -Pattern "CMAKE_GENERATOR_PLATFORM|CMAKE_SYSTEM_PROCESSOR|OQS_|AES|NI|INTRIN" | ForEach-Object { $_.Line }

          cmake --build . --config Release -- /m
          Get-ChildItem -Recurse -File | Select-Object -ExpandProperty FullName

      - name: Build liboqs (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: liboqs
        run: |
          mkdir build
          cd build
          if [ "${{ matrix.config.rid }}" = "linux-arm64" ]; then
            cmake .. -G Ninja -DBUILD_SHARED_LIBS=YES -DCMAKE_BUILD_TYPE=Release -DOQS_BUILD_ONLY_LIB=ON -DOQS_USE_OPENSSL=OFF -DOQS_MINIMAL_BUILD="KEM_ML_KEM_512;KEM_ML_KEM_768;KEM_ML_KEM_1024;SIG_ML_DSA_44;SIG_ML_DSA_65;SIG_ML_DSA_87" -DOQS_OPT_TARGET=generic -DCMAKE_TOOLCHAIN_FILE=../toolchain-aarch64.cmake
          else
            cmake .. -G Ninja -DBUILD_SHARED_LIBS=YES -DCMAKE_BUILD_TYPE=Release -DOQS_BUILD_ONLY_LIB=ON -DOQS_USE_OPENSSL=OFF -DOQS_MINIMAL_BUILD="KEM_ML_KEM_512;KEM_ML_KEM_768;KEM_ML_KEM_1024;SIG_ML_DSA_44;SIG_ML_DSA_65;SIG_ML_DSA_87" -DOQS_OPT_TARGET=generic
          fi
          ninja

      - name: Validate liboqs symbols (Linux)
        if: runner.os == 'Linux'
        working-directory: liboqs/build
        run: |
          LIB="lib/${{ matrix.config.libname }}"
          echo "=== Checking for required OQS symbols in ${LIB} ==="
          REQUIRED_SYMBOLS="OQS_KEM_new OQS_SIG_new OQS_SIG_sign OQS_SIG_verify"
          MISSING=""
          for sym in $REQUIRED_SYMBOLS; do
            if ! nm -D "${LIB}" 2>/dev/null | grep -q " T ${sym}$"; then
              MISSING="${MISSING} ${sym}"
            fi
          done
          if [ -n "${MISSING}" ]; then
            echo "ERROR: Missing required exported symbols:${MISSING}"
            echo "--- All OQS symbols found ---"
            nm -D "${LIB}" | grep OQS || true
            exit 1
          fi
          echo "All required symbols present."

      - name: Validate liboqs deps (Linux native only)
        if: runner.os == 'Linux' && matrix.config.rid != 'linux-arm64'
        working-directory: liboqs/build
        run: |
          LIB="lib/${{ matrix.config.libname }}"
          echo "=== Checking shared library dependencies (ldd) for ${LIB} ==="
          ldd "${LIB}"
          if ldd "${LIB}" 2>&1 | grep -q "not found"; then
            echo "ERROR: One or more shared library dependencies were not found (see ldd output above)."
            exit 1
          fi
          echo "All dependencies resolved."

      - name: Validate liboqs symbols and deps (macOS)
        if: runner.os == 'macOS'
        working-directory: liboqs/build
        run: |
          LIB="lib/${{ matrix.config.libname }}"
          echo "=== Checking shared library dependencies (otool -L) for ${LIB} ==="
          otool -L "${LIB}"
          echo ""
          echo "=== Checking for required OQS symbols in ${LIB} ==="
          REQUIRED_SYMBOLS="OQS_KEM_new OQS_SIG_new OQS_SIG_sign OQS_SIG_verify"
          MISSING=""
          for sym in $REQUIRED_SYMBOLS; do
            # macOS nm -gU output uses '_SYMBOL' prefix for C symbols; match at end of line
            if ! nm -gU "${LIB}" 2>/dev/null | grep -q "${sym}$"; then
              MISSING="${MISSING} ${sym}"
            fi
          done
          if [ -n "${MISSING}" ]; then
            echo "ERROR: Missing required exported symbols:${MISSING}"
            echo "--- All OQS symbols found ---"
            nm -gU "${LIB}" | grep OQS || true
            exit 1
          fi
          echo "All required symbols present."

      - name: Copy lib to standard location (Windows)
        if: runner.os == 'Windows'
        working-directory: liboqs
        shell: pwsh
        run: |
          New-Item -Path build/artifact -ItemType Directory
          Copy-Item -Path build/bin/Release/oqs.dll -Destination build/artifact/ -ErrorAction SilentlyContinue
          if (-not (Test-Path build/artifact/oqs.dll)) { Write-Error "DLL not found!" }

      - name: Copy lib to standard location (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: liboqs
        run: |
          mkdir -p build/artifact
          cp build/lib/${{ matrix.config.libname }} build/artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oqs-${{ matrix.config.rid }}
          path: liboqs/build/artifact/${{ matrix.config.libname }}

  pack-nuget:
    needs: build-natives
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy natives to runtimes
        run: |
          mkdir -p GreenfieldPQC/runtimes/win-x64/native GreenfieldPQC/runtimes/win-arm64/native GreenfieldPQC/runtimes/linux-x64/native GreenfieldPQC/runtimes/linux-arm64/native GreenfieldPQC/runtimes/osx-x64/native GreenfieldPQC/runtimes/osx-arm64/native
          cp artifacts/oqs-win-x64/oqs.dll GreenfieldPQC/runtimes/win-x64/native/ || true
          cp artifacts/oqs-win-arm64/oqs.dll GreenfieldPQC/runtimes/win-arm64/native/ || true
          cp artifacts/oqs-linux-x64/liboqs.so GreenfieldPQC/runtimes/linux-x64/native/ || true
          cp artifacts/oqs-linux-arm64/liboqs.so GreenfieldPQC/runtimes/linux-arm64/native/ || true
          cp artifacts/oqs-osx-x64/liboqs.dylib GreenfieldPQC/runtimes/osx-x64/native/ || true
          cp artifacts/oqs-osx-arm64/liboqs.dylib GreenfieldPQC/runtimes/osx-arm64/native/ || true

      - name: Build
        working-directory: GreenfieldPQC
        run: dotnet build -c Release

      - name: Pack NuGet
        working-directory: GreenfieldPQC
        run: dotnet pack -c Release --no-build --output ../nupkgs

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkgs/*.nupkg
